server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:openclaw4;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

llm:
  base-url: https://api.openai.com
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

search:
  provider: ${SEARCH_PROVIDER:tavily}
  tavily-api-key: ${TAVILY_API_KEY:}

tools:
  profile: ${TOOL_PROFILE:full}
  allow: ${TOOL_ALLOW:}
  deny: ${TOOL_DENY:}

execution:
  parallel: ${EXECUTION_PARALLEL:false}
  compaction-threshold: 4000
  max-steps-per-task: 10
  loop-detection-window: 20
  loop-detection-threshold: 3

sandbox:
  dir: sandbox

browser:
  enabled: ${BROWSER_ENABLED:true}
  headless: ${BROWSER_HEADLESS:true}
