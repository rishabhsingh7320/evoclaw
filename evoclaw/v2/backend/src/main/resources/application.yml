server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:omenclawdemo2;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

llm:
  base-url: https://api.openai.com
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

search:
  provider: ${SEARCH_PROVIDER:tavily}
  tavily-api-key: ${TAVILY_API_KEY:}
